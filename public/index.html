<!DOCTYPE html>
<!-- Brand Mirror v3.1 - typo fix -->
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Mirror · Frischmuth.Design</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,700;1,700&family=Playfair+Display:ital,wght@0,700;1,700&family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,600;1,400;1,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --night:#0D0B14;--orange:#FF5C00;--orange-light:#FFF0E8;
  --purple:#5B3FA0;--white:#FFFFFF;--off:#FAFAFA;
  --muted:#4A4540;--hint:#6B6560;--border:#E0D8D0;
  --on-dark:#E8E4DE;--muted-dark:#B8B0A8;--green:#2D8A4E;
}
body{font-family:'Jost',sans-serif;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh}
.app{width:100%;max-width:430px;min-height:100vh;background:var(--off);display:flex;flex-direction:column;position:relative;overflow:hidden}

/* SLIDE */
.slide{width:100%;flex:1;display:flex;flex-direction:column;animation:sIn .35s ease}
@keyframes sIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.slide.back{animation:sBk .35s ease}
@keyframes sBk{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}

/* ── SPARK OVERLAY ── */
#spark-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;display:none;overflow:hidden}
.spark{position:absolute;border-radius:50%;animation:sparkFly var(--dur) ease-out forwards}
@keyframes sparkFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}

/* ── LOADING ANIMATION ── */
.load-screen{background:var(--night);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:48px 32px;flex:1;position:relative;overflow:hidden}
.load-screen::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(91,63,160,.3) 0%,transparent 70%);border-radius:50%}
.load-screen::after{content:'';position:absolute;bottom:-60px;left:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(255,92,0,.2) 0%,transparent 70%);border-radius:50%}

.orbit-loader{position:relative;width:120px;height:120px;z-index:1}
.orbit-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid transparent;animation:orbitSpin var(--spd) linear infinite}
.orbit-ring:nth-child(1){border-top-color:var(--orange);border-right-color:rgba(255,92,0,.3);--spd:1.8s;inset:0}
.orbit-ring:nth-child(2){border-top-color:var(--purple);border-left-color:rgba(91,63,160,.3);--spd:2.8s;inset:16px;animation-direction:reverse}
.orbit-ring:nth-child(3){border-bottom-color:rgba(255,255,255,.2);--spd:4s;inset:32px}
.orbit-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--orange);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbitPulse 1.2s ease-in-out infinite}
@keyframes orbitSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes orbitPulse{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 0 0 rgba(255,92,0,.4)}50%{transform:translate(-50%,-50%) scale(1.5);box-shadow:0 0 0 8px rgba(255,92,0,0)}}

.load-label{font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--muted-dark);z-index:1;text-align:center}
.dots{display:flex;gap:8px;z-index:1}
.dot{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:dp 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}

/* ── TOP NAV (back button) ── */
.top-nav{display:flex;align-items:center;padding:14px 20px 0;min-height:48px}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-family:'Jost',sans-serif;font-size:15px;font-weight:400;color:var(--hint);cursor:pointer;padding:6px 8px;border-radius:8px;transition:color .15s,background .15s}
.back-btn:hover{color:var(--night);background:rgba(0,0,0,.04)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:2}
.top-nav-dark{background:var(--night)}
.top-nav-dark .back-btn{color:var(--muted-dark)}
.top-nav-dark .back-btn:hover{color:var(--white);background:rgba(255,255,255,.08)}

/* PROGRESS */
.prog-wrap{background:var(--night)}
.prog-bar{height:3px;background:rgba(255,255,255,.1)}
.prog-fill{height:100%;background:var(--orange);transition:width .5s ease}
.prog-label{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted-dark);padding:10px 20px 14px}

/* START */
.start-bar{height:4px;background:var(--orange)}
.start-body{background:var(--night);color:var(--white);flex:1;display:flex;flex-direction:column;padding:32px 28px 52px;position:relative;overflow:hidden}
.start-body::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(91,63,160,.45) 0%,transparent 70%);border-radius:50%}
.start-body::after{content:'';position:absolute;bottom:-40px;left:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,92,0,.25) 0%,transparent 70%);border-radius:50%}
.logo-w{position:relative;z-index:2;margin-bottom:44px}
.logo-w img{height:28px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--orange);margin-bottom:12px;position:relative;z-index:2}
.h1{font-size:52px;font-weight:700;font-style:italic;text-transform:uppercase;line-height:1.1;letter-spacing:-1.5px;color:var(--white);flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:2}
.h1 span{color:var(--orange)}
.divider{width:40px;height:3px;background:var(--orange);margin:24px 0 18px;position:relative;z-index:2}
.start-p{font-size:15px;color:var(--on-dark);line-height:1.55;margin-bottom:8px;position:relative;z-index:2}
.start-p.accent{color:var(--orange);font-weight:500;margin-bottom:28px}
.btn-start{width:100%;padding:18px;background:var(--orange);color:var(--white);border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:16px;font-weight:700;cursor:pointer;position:relative;z-index:2;transition:opacity .2s,transform .15s;box-shadow:0 4px 20px rgba(255,92,0,.35)}
.btn-start:hover{opacity:.92;transform:translateY(-1px)}
.btn-start:active{transform:scale(.98)}
.footnote{text-align:center;font-size:11px;color:rgba(255,255,255,.2);margin-top:14px;letter-spacing:1px;position:relative;z-index:2}

/* QUESTION */
.q-screen{background:var(--off);display:flex;flex-direction:column}
.q-content{padding:4px 20px 24px;flex:1;display:flex;flex-direction:column}
.q-headline{font-size:23px;font-weight:700;font-style:italic;text-transform:uppercase;line-height:1.35;letter-spacing:-.5px;color:var(--night);margin-bottom:6px}
.q-hint{font-size:13px;color:var(--hint);margin-bottom:20px;line-height:1.5;font-style:italic}
.answers{display:flex;flex-direction:column;gap:10px;flex:1}

/* ANSWER BUTTONS */
.ans-btn{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;width:100%;font-family:'Jost',sans-serif;transition:border-color .15s,background .15s,transform .1s;opacity:0;animation:ansIn .4s ease forwards}
.ans-btn:nth-child(1){animation-delay:.06s}
.ans-btn:nth-child(2){animation-delay:.12s}
.ans-btn:nth-child(3){animation-delay:.18s}
.ans-btn:nth-child(4){animation-delay:.24s}
@keyframes ansIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ans-btn:hover{border-color:var(--orange);background:rgba(255,92,0,.03);transform:translateX(2px)}
.ans-btn.picked{background:var(--night);border-color:var(--night)}

/* CIRCLE LETTER BADGE */
.ans-badge{width:32px;height:32px;border-radius:50%;background:var(--orange-light);border:1.5px solid rgba(255,92,0,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:700;color:var(--orange);transition:all .2s;margin-top:2px}
.ans-btn.picked .ans-badge{background:var(--orange);border-color:var(--orange);color:var(--white)}

.ans-text{font-size:14px;line-height:1.55;color:var(--muted);padding-top:4px;flex:1;transition:color .2s}
.ans-btn.picked .ans-text{color:var(--white)}
.ans-bold{font-weight:700;color:var(--night)}
.ans-btn.picked .ans-bold{color:var(--white)}

/* VALIDATION */
.val-screen{background:var(--off);display:flex;flex-direction:column}
.val-content{padding:4px 20px 32px;flex:1;display:flex;flex-direction:column}
.reveal-card{background:var(--night);border-radius:16px;padding:28px 24px;margin-bottom:22px;position:relative;overflow:hidden}
.reveal-card::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(91,63,160,.4) 0%,transparent 70%);border-radius:50%}
.reveal-card::after{content:'';position:absolute;bottom:-30px;left:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,92,0,.2) 0%,transparent 70%);border-radius:50%}
.reveal-label{font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--muted-dark);margin-bottom:14px;position:relative;z-index:1}
.reveal-name{font-size:44px;font-weight:700;font-style:italic;text-transform:uppercase;color:var(--white);line-height:1.1;margin-bottom:12px;letter-spacing:-1px;position:relative;z-index:1}
.reveal-bar{width:44px;height:3px;background:var(--purple);border-radius:2px;margin-bottom:14px;position:relative;z-index:1}
.reveal-text{font-size:15px;line-height:1.7;color:var(--white);font-weight:500;position:relative;z-index:1}
.val-q{font-size:22px;font-weight:700;font-style:italic;text-transform:uppercase;color:var(--night);margin-bottom:16px;line-height:1.35;letter-spacing:-.5px}
.val-btns{display:flex;flex-direction:column;gap:10px}
.val-btn{padding:17px 20px;border-radius:12px;border:1.5px solid var(--border);background:var(--white);font-family:'Jost',sans-serif;font-size:15px;font-weight:500;color:var(--night);cursor:pointer;text-align:left;transition:all .15s}
.val-btn.primary{background:var(--night);border-color:var(--night);color:var(--white)}
.val-btn:hover:not(.primary){border-color:var(--orange)}

/* CORRECTION */
.corr-screen{background:var(--off);display:flex;flex-direction:column}
.corr-content{padding:4px 20px 32px;flex:1;display:flex;flex-direction:column}
.corr-h{font-size:26px;font-weight:700;font-style:italic;text-transform:uppercase;line-height:1.35;color:var(--night);margin-bottom:8px;letter-spacing:-.5px}
.corr-sub{font-size:13px;font-style:italic;color:var(--hint);margin-bottom:22px}
.alt-cards{display:flex;flex-direction:column;gap:12px;flex:1}
.alt-card{display:flex;align-items:flex-start;gap:16px;padding:18px 20px;background:var(--white);border:1.5px solid var(--border);border-left:4px solid var(--orange);border-radius:12px;cursor:pointer;font-family:'Jost',sans-serif;text-align:left;width:100%;transition:all .15s}
.alt-card:nth-child(even){border-left-color:var(--night)}
.alt-card:hover{transform:translateX(3px);border-color:var(--orange)}
.alt-name{font-size:15px;font-weight:700;font-style:italic;text-transform:uppercase;color:var(--night);margin-bottom:4px}
.alt-desc{font-size:13px;color:var(--muted);line-height:1.5}
.restart-link{background:none;border:none;font-family:'Jost',sans-serif;font-size:14px;color:var(--hint);cursor:pointer;padding:18px 0 0;text-align:center;text-decoration:underline;text-underline-offset:3px;width:100%}

/* RESULT */
.res-screen{background:var(--off)}
.res-hero{padding:44px 28px 36px;position:relative;overflow:hidden}
.res-topbar{position:absolute;top:0;left:0;right:0;height:4px}
.res-label{font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;position:relative;z-index:1;opacity:.7}
.res-name{font-size:58px;font-weight:700;line-height:1.05;letter-spacing:-2px;margin-bottom:14px;position:relative;z-index:1}
.res-bar{width:52px;height:4px;border-radius:2px;margin-bottom:16px;position:relative;z-index:1}
.res-tagline{font-size:15px;line-height:1.75;font-weight:400;position:relative;z-index:1;opacity:.85}
.res-body{padding:28px 20px 48px;display:flex;flex-direction:column;gap:26px}
.sec-label{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--hint);margin-bottom:12px}
.res-box{background:var(--white);border-radius:14px;padding:20px;border:1px solid var(--border)}
.color-row{display:flex;gap:10px}
.sw-wrap{flex:1;text-align:center}
.sw{height:60px;border-radius:10px;margin-bottom:6px;border:1px solid rgba(0,0,0,.06)}
.sw-name{font-size:11px;font-weight:600;color:var(--night)}
.kw-row{display:flex;flex-wrap:wrap;gap:8px}
.kw{font-size:13px;font-weight:500;color:var(--orange)}.kw::before{content:"#"}
.quote-list{display:flex;flex-direction:column;gap:10px}
.quote-item{padding:12px 16px;border-left:3px solid var(--orange);background:rgba(255,92,0,.04);border-radius:0 8px 8px 0;font-size:14px;font-style:italic;color:var(--muted);line-height:1.5}
.client-list{display:flex;flex-direction:column;gap:8px}
.dd{border:1.5px solid var(--border);border-radius:12px;overflow:hidden;background:var(--white)}
.dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;background:var(--white);border:none;width:100%;font-family:'Jost',sans-serif;text-align:left;transition:background .15s}
.dd-hdr:hover{background:rgba(255,92,0,.04)}
.dd.open .dd-hdr{background:var(--night)}
.dd-name{font-size:14px;font-weight:700;font-style:italic;text-transform:uppercase;color:var(--night);letter-spacing:.3px}
.dd.open .dd-name{color:var(--white)}
.dd-arrow{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:transform .3s,background .2s,border-color .2s;flex-shrink:0}
.dd.open .dd-arrow{transform:rotate(180deg);background:var(--orange);border-color:var(--orange)}
.dd-arrow svg{width:10px;height:10px;stroke:var(--hint);fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.5;transition:stroke .2s}
.dd.open .dd-arrow svg{stroke:var(--white)}
.dd-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;padding:0 18px;font-size:13px;color:var(--muted);line-height:1.65}
.dd.open .dd-body{max-height:200px;padding:14px 18px;border-top:1px solid rgba(0,0,0,.06)}
.anti-card{padding:14px 16px;border-radius:10px;border:1px solid #FFE0E0;border-left:4px solid #C04040;background:#FFF8F8}
.anti-name{font-size:14px;font-weight:700;font-style:italic;color:var(--night);margin-bottom:4px}
.anti-desc{font-size:13px;color:#C04040;line-height:1.4}
.contract-list{display:flex;flex-direction:column;gap:10px}
.ci{font-size:14px;color:var(--muted);line-height:1.5;padding-left:22px;position:relative}
.ci::before{position:absolute;left:0;font-weight:700}
.ci.yes::before{content:"\2713";color:#2D8A4E}
.ci.no::before{content:"\2717";color:#C04040}.ci.no{color:#C04040}
.steps-list{display:flex;flex-direction:column;gap:12px}
.step{display:flex;gap:14px;align-items:flex-start}
.step-n{width:28px;height:28px;border-radius:50%;background:var(--orange);color:var(--white);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-t{font-size:14px;color:var(--muted);line-height:1.5;padding-top:4px}
.typo-spec{background:var(--white);border-radius:14px;padding:24px 20px;border:1px solid var(--border)}
.typo-div{height:1px;background:var(--border);margin:14px 0}
.typo-desc{font-size:13px;color:var(--muted);line-height:1.7}
.marke-pill{font-size:13px;font-weight:600;color:var(--night);padding:6px 14px;background:var(--white);border:1px solid var(--border);border-radius:8px}
.res-cta{padding:28px 20px 40px;display:flex;flex-direction:column;gap:12px}
.cta-quote{font-size:18px;font-weight:500;font-style:italic;text-align:center;margin-bottom:4px;line-height:1.5}
.btn-cta{width:100%;padding:18px;color:#FFFFFF;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:16px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;background:linear-gradient(135deg,#FF5C00 0%,#FF8C00 50%,#5B3FA0 100%);background-size:200% auto;box-shadow:0 4px 24px rgba(255,92,0,.45);transition:transform .2s,box-shadow .2s,background-position .4s}
.btn-cta .arrow{display:inline-block;transition:transform .35s cubic-bezier(0.34,1.56,0.64,1),opacity .25s}
.btn-cta:hover .arrow{transform:translateX(5px)}
.btn-cta.firing .arrow{animation:arrowFly .5s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
@keyframes arrowFly{0%{transform:translateX(0);opacity:1}60%{transform:translateX(24px);opacity:0}61%{transform:translateX(-20px);opacity:0}100%{transform:translateX(0);opacity:1}}
.btn-cta::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transition:left .55s ease}
.btn-cta:hover::before{left:100%}
.btn-cta:hover{transform:translateY(-2px);background-position:right center;box-shadow:0 10px 36px rgba(255,92,0,.55),0 0 0 3px rgba(91,63,160,.3)}
.btn-cta:active{transform:scale(.98)}
.btn-ghost{width:100%;padding:16px;background:transparent;border:1.5px solid rgba(255,255,255,.25);border-radius:12px;font-family:'Jost',sans-serif;font-size:14px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.65);letter-spacing:.3px}
.btn-ghost:hover{border-color:rgba(255,92,0,.6);color:#FF5C00}
@media(min-width:500px){.app{margin:24px auto;min-height:auto;border-radius:24px;box-shadow:0 32px 80px rgba(0,0,0,.5)}}

/* TYPO SPECIMEN - FORCE WHITE TEXT */
.typo-wrap { color: #FFFFFF; }
.typo-wrap .tz-upper { 
  font-weight: 700; font-size: 15px; letter-spacing: 2px;
  line-height: 1.6; word-break: break-all; margin-bottom: 10px;
  opacity: 1;
}
.typo-wrap .tz-lower { 
  font-weight: 400; font-size: 14px; letter-spacing: 1px;
  word-break: break-all; margin-bottom: 10px; opacity: 0.65;
}
.typo-wrap .tz-num { 
  font-size: 24px; font-weight: 700; letter-spacing: 4px; margin-bottom: 14px;
}
/* EMAIL CAPTURE SCREEN */
.email-screen{
  background:var(--night);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 28px;flex:1;
  position:relative;overflow:hidden;
}
.email-screen::before{
  content:'';position:absolute;
  top:-60px;right:-60px;
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(91,63,160,.45) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;
}
.email-screen::after{
  content:'';position:absolute;
  bottom:-40px;left:-40px;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,92,0,.25) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;
}
.email-icon{font-size:44px;margin-bottom:20px;position:relative;z-index:1;}
.email-headline{
  font-size:32px;font-weight:700;font-style:italic;
  text-transform:uppercase;color:var(--white);
  text-align:center;line-height:1.15;
  margin-bottom:12px;letter-spacing:-1px;
  position:relative;z-index:1;
}
.email-headline span{color:var(--orange);}
.email-sub{
  font-size:15px;color:var(--muted-dark);
  text-align:center;line-height:1.65;
  margin-bottom:32px;font-weight:300;
  position:relative;z-index:1;
}
.email-form{width:100%;position:relative;z-index:1;}
.email-input{
  width:100%;padding:18px 20px;
  background:rgba(255,255,255,.08);
  border:1.5px solid rgba(255,255,255,.15);
  border-radius:12px;font-family:'Jost',sans-serif;
  font-size:16px;color:var(--white);
  outline:none;transition:border-color .2s;
  margin-bottom:12px;
}
.email-input::placeholder{color:rgba(255,255,255,.3);}
.email-input:focus{border-color:var(--orange);}
.email-error{
  font-size:13px;color:#FF6B6B;
  margin-bottom:12px;text-align:center;
  display:none;position:relative;z-index:1;
}
.btn-email{
  width:100%;padding:18px;
  background:linear-gradient(135deg,#FF5C00 0%,#FF8C00 50%,#5B3FA0 100%);
  color:var(--white);border:none;border-radius:12px;

function launchSparks(){
  var overlay = document.getElementById('spark-overlay');
  overlay.style.display = 'block';
  overlay.innerHTML = '';
  var colors = ['#FF5C00','#FFB347','#FFD700','#FF6B6B','#A78BFA','#60A5FA','#FBBF24','#34D399'];
  var app = document.getElementById('app');
  var rect = app ? app.getBoundingClientRect() : {left:0,top:0,width:window.innerWidth,height:window.innerHeight};
  var cx = rect.left + rect.width/2;
  var cy = rect.top + rect.height/2;
  for(var i=0;i<80;i++){
    var el = document.createElement('div');
    el.className = 'spark';
    var angle = Math.random()*Math.PI*2;
    var dist = 80 + Math.random()*300;

// ── ACTIONS ─────────────────────────────────────
function startQuiz(){
  state.screen='question';state.qi=0;
  state.scores=initScores();state.answers=[];
  state.archetype=null;state.result=null;
  render();
}

function pickAnswer(i){
  var q = QUESTIONS[state.qi];
  var a = q.answers[i];
  Object.keys(a.s).forEach(function(arch){state.scores[arch]=(state.scores[arch]||0)+a.s[arch];});
  state.answers.push(a.t);
  state.qi++;
  if(state.qi>=QUESTIONS.length){
    state.archetype=topArchetype(state.scores);
    state.screen='validation';
  }
  render();
}

function validateYes(){state.screen='email';render();}
function validatePartly(){state.screen='correction';render();}
function validateNo(){state.screen='correction';render();}
function pickAlt(name){state.archetype=name;state.screen='email';render();}

function goBack(){
  if(state.screen==='validation'||state.screen==='correction'){
    state.qi--;state.answers.pop();
    state.scores=initScores();
    state.answers.forEach(function(t,qi){
      var m=QUESTIONS[qi].answers.find(function(a){return a.t===t;});
      if(m) Object.keys(m.s).forEach(function(arch){state.scores[arch]=(state.scores[arch]||0)+m.s[arch];});
    });
    state.screen='question';render();
    var s=document.querySelector('.slide');if(s)s.classList.add('back');
    return;
  }
  if(state.qi>0){
    state.qi--;state.answers.pop();
    state.scores=initScores();
    state.answers.forEach(function(t,qi){
      var m=QUESTIONS[qi].answers.find(function(a){return a.t===t;});
      if(m) Object.keys(m.s).forEach(function(arch){state.scores[arch]=(state.scores[arch]||0)+m.s[arch];});
    });
    state.screen='question';render();
    var s=document.querySelector('.slide');if(s)s.classList.add('back');
  }
}

function restart(){
  state.screen='start';state.qi=0;
  state.scores=initScores();state.answers=[];
  state.archetype=null;state.result=null;
  render();
}
