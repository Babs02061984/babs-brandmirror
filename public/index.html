<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archetypen-Finder · Frischmuth. Design</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;1,700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --midnight: #0D0B14;
  --purple: #5B3FA0;
  --purple-soft: #7B5BC4;
  --orange: #FF5C00;
  --white: #FFFFFF;
  --off-white: #FAFAFA;
  --text-dark: #0D0B14;
  --text-muted: #4A4540;
  --text-hint: #6B6560;
  --text-on-dark: #E8E4DE;
  --text-muted-dark: #B8B0A8;
  --border: #E0D8D0;
}

body {
  font-family: 'Jost', sans-serif;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  background: var(--off-white);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TRANSITIONS ── */
.slide {
  width: 100%;
  flex: 1;
  display: flex;
  flex-direction: column;
  animation: slideIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(32px); }
  to   { opacity: 1; transform: translateX(0); }
}
.slide.back {
  animation: slideInBack 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
@keyframes slideInBack {
  from { opacity: 0; transform: translateX(-32px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── SHAKE ANIMATION ── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-4px); }
  40%      { transform: translateX(4px); }
  60%      { transform: translateX(-3px); }
  80%      { transform: translateX(3px); }
}
.shake { animation: shake 0.35s ease; }

/* ── TYPEWRITER ── */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cursor {
  display: inline-block;
  width: 3px;
  height: 1em;
  background: var(--orange);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.8s step-end infinite;
}

/* ── PROGRESS ── */
.progress-wrap {
  background: var(--midnight);
  padding: 0;
}
.progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.1);
}
.progress-fill {
  height: 100%;
  background: var(--orange);
  transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.progress-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted-dark);
  padding: 10px 24px 14px;
}

/* ── CHIP ── */
.chip {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--orange);
  color: var(--orange);
  background: transparent;
}

/* ── START SCREEN ── */
.start-screen {
  background: var(--midnight);
}
.start-top-bar {
  height: 4px;
  background: var(--orange);
}
.start-content {
  padding: 40px 28px 52px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.start-logo {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted-dark);
  margin-bottom: 56px;
}
.start-eyebrow {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 16px;
}
.start-headline {
  font-size: 54px;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  line-height: 1.0;
  letter-spacing: -1.5px;
  color: var(--white);
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.start-headline span { color: var(--orange); display: block; }
.start-divider {
  width: 40px;
  height: 3px;
  background: var(--orange);
  margin: 32px 0 20px;
}
.start-sub {
  font-size: 16px;
  color: var(--text-muted-dark);
  line-height: 1.65;
  margin-bottom: 6px;
  font-weight: 300;
}
.start-dry {
  font-size: 13px;
  color: var(--text-hint-dark, #9E9890);
  font-style: italic;
  margin-bottom: 40px;
}
.btn-primary {
  width: 100%;
  padding: 18px;
  background: var(--orange);
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-family: 'Jost', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: transform 0.15s, opacity 0.15s;
  position: relative;
  overflow: hidden;
}
.btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.98); }
.start-footnote {
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  margin-top: 16px;
  letter-spacing: 1px;
}

/* ── QUESTION SCREEN ── */
.question-screen { background: var(--off-white); }
.question-content {
  padding: 20px 24px 28px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.question-quip {
  font-size: 13px;
  font-style: italic;
  color: var(--text-hint);
  margin-bottom: 20px;
  padding: 10px 14px;
  background: rgba(255,92,0,0.06);
  border-left: 2px solid var(--orange);
  border-radius: 0 8px 8px 0;
}
.question-headline {
  font-size: 25px;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  line-height: 1.1;
  letter-spacing: -0.5px;
  color: var(--text-dark);
  margin: 14px 0 8px;
}
.question-hint {
  font-size: 13px;
  color: var(--text-hint);
  margin-bottom: 24px;
  line-height: 1.5;
}
.answers {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.answer-btn {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  font-family: 'Jost', sans-serif;
  width: 100%;
}
.answer-btn:hover {
  border-color: var(--orange);
  background: rgba(255,92,0,0.03);
  transform: translateX(2px);
}
.answer-btn.selected {
  background: var(--midnight);
  border-color: var(--midnight);
  animation: shake 0.35s ease;
}
.answer-badge {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: #EEE8E0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dark);
  flex-shrink: 0;
  transition: all 0.2s;
}
.answer-btn.selected .answer-badge {
  background: var(--orange);
  color: var(--white);
}
.answer-text {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-muted);
  padding-top: 6px;
  transition: color 0.2s;
}
.answer-btn.selected .answer-text { color: var(--white); }
.back-link {
  background: none;
  border: none;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  color: var(--text-hint);
  cursor: pointer;
  padding: 16px 24px;
  text-align: left;
  transition: color 0.15s;
}
.back-link:hover { color: var(--text-dark); }

/* ── VALIDATION SCREEN ── */
.validation-screen { background: var(--off-white); }
.validation-content {
  padding: 20px 24px 32px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.reveal-card {
  background: var(--midnight);
  border-radius: 16px;
  padding: 28px 24px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.reveal-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(91,63,160,0.3) 0%, transparent 70%);
  border-radius: 50%;
}
.reveal-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted-dark);
  margin-bottom: 14px;
}
.reveal-name {
  font-size: 44px;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  color: var(--white);
  line-height: 1.0;
  margin-bottom: 14px;
  letter-spacing: -1px;
}
.reveal-accent {
  width: 44px;
  height: 3px;
  background: var(--purple);
  border-radius: 2px;
  margin-bottom: 16px;
}
.reveal-text {
  font-size: 14px;
  line-height: 1.65;
  color: var(--text-muted-dark);
  font-weight: 300;
  position: relative;
  z-index: 1;
}
.validation-question {
  font-size: 22px;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  color: var(--text-dark);
  margin-bottom: 16px;
  line-height: 1.15;
  letter-spacing: -0.5px;
}
.val-btns { display: flex; flex-direction: column; gap: 10px; }
.val-btn {
  padding: 17px 20px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-family: 'Jost', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text-dark);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}
.val-btn:first-child {
  background: var(--midnight);
  border-color: var(--midnight);
  color: var(--white);
}
.val-btn:hover:not(:first-child) {
  border-color: var(--orange);
}
.val-btn:hover:first-child { opacity: 0.9; }

/* ── CORRECTION SCREEN ── */
.correction-screen { background: var(--off-white); }
.correction-content {
  padding: 20px 24px 32px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.correction-headline {
  font-size: 26px;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  line-height: 1.1;
  color: var(--text-dark);
  margin: 14px 0 8px;
  letter-spacing: -0.5px;
}
.correction-dry {
  font-size: 13px;
  font-style: italic;
  color: var(--text-hint);
  margin-bottom: 24px;
}
.archetype-cards { display: flex; flex-direction: column; gap: 12px; flex: 1; }
.archetype-card {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 20px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-left: 4px solid var(--orange);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Jost', sans-serif;
  text-align: left;
  width: 100%;
}
.archetype-card:nth-child(even) { border-left-color: var(--midnight); }
.archetype-card:hover { transform: translateX(3px); border-color: var(--orange); }
.card-emoji { font-size: 28px; flex-shrink: 0; }
.card-name {
  font-size: 16px;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  color: var(--text-dark);
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}
.card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
.restart-link {
  background: none;
  border: none;
  font-family: 'Jost', sans-serif;
  font-size: 13px;
  color: var(--text-hint);
  cursor: pointer;
  padding: 20px 0 0;
  text-align: center;
  text-decoration: underline;
  text-underline-offset: 3px;
  width: 100%;
  transition: color 0.15s;
}
.restart-link:hover { color: var(--text-dark); }

/* ── LOADING SCREEN ── */
.loading-screen {
  background: var(--midnight);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 48px 32px;
  flex: 1;
}
.loading-record {
  width: 100px;
  height: 100px;
  position: relative;
}
.record-outer {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: var(--midnight);
  border: 3px solid var(--orange);
  animation: spin 2s linear infinite;
  position: absolute;
}
.record-groove {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,92,0,0.2);
}
.record-groove:nth-child(2) { width: 80px; height: 80px; top: 7px; left: 7px; }
.record-groove:nth-child(3) { width: 60px; height: 60px; top: 17px; left: 17px; }
.record-center {
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--orange);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.loading-texts {
  text-align: center;
}
.loading-main {
  font-size: 20px;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  color: var(--white);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.loading-dry {
  font-size: 13px;
  font-style: italic;
  color: var(--text-muted-dark);
  line-height: 1.6;
}
.loading-dots { display: flex; gap: 8px; }
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--orange);
  animation: dotPulse 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
  40%          { opacity: 1;   transform: scale(1.2); }
}

/* ── RESULT SCREEN ── */
.result-screen { background: var(--off-white); }
.result-hero {
  background: var(--midnight);
  padding: 44px 28px 36px;
  position: relative;
  overflow: hidden;
}
.result-hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(91,63,160,0.4) 0%, transparent 70%);
  border-radius: 50%;
}
.result-hero::after {
  content: '';
  position: absolute;
  bottom: -20px; left: -20px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(255,92,0,0.2) 0%, transparent 70%);
  border-radius: 50%;
}
.result-top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--orange);
}
.result-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted-dark);
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.result-name {
  font-size: 60px;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  color: var(--white);
  line-height: 1.0;
  letter-spacing: -2px;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}
.result-orange-bar {
  width: 52px; height: 4px;
  background: var(--orange);
  border-radius: 2px;
  margin-bottom: 18px;
  position: relative;
  z-index: 1;
}
.result-tagline {
  font-size: 16px;
  color: var(--text-muted-dark);
  line-height: 1.7;
  font-weight: 300;
  position: relative;
  z-index: 1;
}
.result-body {
  padding: 28px 24px 48px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-hint);
  margin-bottom: 12px;
}
.result-box {
  background: var(--white);
  border-radius: 14px;
  padding: 20px;
  border: 1px solid var(--border);
}
.color-row { display: flex; gap: 10px; }
.color-swatch-wrap { flex: 1; text-align: center; }
.color-swatch {
  height: 56px;
  border-radius: 10px;
  margin-bottom: 6px;
  border: 1px solid rgba(0,0,0,0.06);
}
.swatch-name { font-size: 10px; font-weight: 600; color: var(--text-dark); margin-bottom: 2px; }
.swatch-hex { font-size: 9px; color: var(--text-hint); letter-spacing: 0.5px; }
.quote-list { display: flex; flex-direction: column; gap: 10px; }
.quote-item {
  padding: 12px 16px;
  border-left: 3px solid var(--orange);
  background: rgba(255,92,0,0.04);
  border-radius: 0 8px 8px 0;
  font-size: 14px;
  font-style: italic;
  color: var(--text-muted);
  line-height: 1.5;
}
.keyword-row { display: flex; flex-wrap: wrap; gap: 8px; }
.keyword {
  padding: 6px 14px;
  background: var(--midnight);
  color: var(--white);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.client-list { display: flex; flex-direction: column; gap: 10px; }
.client-item {
  padding: 14px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  border-left: 4px solid var(--orange);
  background: var(--white);
}
.client-item.anti {
  border-left-color: #C04040;
  background: #FFF8F8;
}
.client-name { font-size: 14px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; font-style: italic; }
.client-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
.contract-list { display: flex; flex-direction: column; gap: 10px; }
.contract-item {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.5;
  padding-left: 20px;
  position: relative;
}
.contract-item::before {
  position: absolute;
  left: 0;
  font-weight: 700;
}
.contract-item.yes::before { content: "✓"; color: var(--orange); }
.contract-item.no::before  { content: "✗"; color: #C04040; }
.contract-item.no { color: #C04040; }
.steps-list { display: flex; flex-direction: column; gap: 12px; }
.step-item {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--orange);
  color: var(--white);
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.step-text { font-size: 14px; color: var(--text-muted); line-height: 1.5; padding-top: 4px; }
.result-cta {
  background: var(--midnight);
  padding: 28px 24px 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.cta-dry {
  font-size: 13px;
  font-style: italic;
  color: var(--text-muted-dark);
  text-align: center;
  margin-bottom: 4px;
}
.btn-cta {
  width: 100%;
  padding: 18px;
  background: var(--orange);
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-family: 'Jost', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-cta:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-cta-ghost {
  width: 100%;
  padding: 16px;
  background: transparent;
  color: var(--text-muted-dark);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  font-family: 'Jost', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-cta-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.25); }

@media (min-width: 500px) {
  .app {
    margin: 24px auto;
    min-height: auto;
    border-radius: 24px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>

// ── DRY WIT COPY ──────────────────────────────────────────
const QUIPS = {
  q1: "Keine falsche Bescheidenheit. Was ist es wirklich?",
  q2a: "Change-Maker. Okay. Aber wie genau?",
  q2b: "Leader. Gut. Was unterscheidet dich von jedem anderen, der das auch sagt?",
  q2c: "Connector. Klingt nach LinkedIn-Bio. Aber okay – was davon?",
  q3a: "Fast da. Noch eine Frage. Wir versprechen, es ist die letzte.",
  q3b: "Letzte Frage. Ernsthaft diesmal."
};

const LOADING_TEXTS = [
  "Dein Profil wird analysiert...",
  "Archetypische Muster werden abgeglichen...",
  "Fast fertig. Wir lügen nicht."
];

// ── DECISION TREE ──────────────────────────────────────────
const DECISION_TREE = {
  q1: {
    text: "Was treibt dich in deinem Business wirklich an?",
    hint: "Antworte spontan – das erste Gefühl zählt.",
    chip: "Grundorientierung",

// ── ACTIONS ────────────────────────────────────────────────
function startQuiz() {
  state.screen = 'question';
  state.currentQuestion = 'q1';
  state.history = [];
  state.answers = [];
  render();
}

function selectAnswer(index) {
  const q = DECISION_TREE[state.currentQuestion];
  const next = q.next[index];
  state.history.push({ question: state.currentQuestion, answers: [...state.answers] });
  state.answers.push(q.answers[index].text);
  if (DECISION_TREE[next]) {
    state.currentQuestion = next;
    state.screen = 'question';
  } else {
    state.archetype = next;
    state.screen = 'validation';
  }
  render();
}

function validateYes() { generateResult(); }
function validatePartly() { state.screen = 'correction'; render(); }
function validateNo() { state.screen = 'correction'; render(); }
function selectAlternative(a) { state.archetype = a; generateResult(); }

function goBack() {
  if (state.history.length > 0) {
    const prev = state.history.pop();
    state.currentQuestion = prev.question;
    state.answers = prev.answers;
    state.screen = 'question';
    render();
    document.querySelector('.slide')?.classList.add('back');
  }
}

function restart() {
  Object.assign(state, { screen:'start', history:[], answers:[], archetype:null, result:null });
  render();
}

// ── API ────────────────────────────────────────────────────
async function generateResult() {
  state.screen = 'loading';
  render();
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: buildPrompt(state.archetype, state.answers) }]
      })
    });
    const data = await res.json();
    const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    state.result = JSON.parse(text.replace(/```json|```/g,"").trim());
  } catch(e) {
    state.result = getFallback(state.archetype);
  }
  state.screen = 'result';
  render();
}
